<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Element Selector</title>
    <link rel="stylesheet" href="pseudoelementselector.css">
</head>
<body>
    <!--first letter: styles the first letter of a text-->
    <p>Welcome to CSS learning.</p>
    <!--first-line: Styles the first line of a paragraph-->
    <p>
    Learning CSS is fun and interesting.
    Practice every day to improve your skills.
    </p>
    <!--Before: adds content before an element-->
    <h2>Important Notice</h2>
    <!--after: Adds content after an element.-->
    <h1>Completed Task</h1>
    <!--Selection: Styles text selected by the user.-->
    <h1>My name is Nidaharmain</h1>
    <!--placeholder:Styles placeholder text inside input fields-->
    <input type="email" placeholder="Enter your email">
    <!--marker:Styles bullets or numbers in lists-->
    <ol>
    <li>Python</li>
    <li>Java</li>
    <li>C++</li>
</ol>
</body>
</html>
