<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PseduoClassSelector</title>
    <link rel="stylesheet" href="./pseudoclassselector.css">
</head>
<body>
    <!--visited : Selects the link that is already clicked by the user-->
    <a href="https://www.google.com" target="_blank">Google</a><br><br>
    <!--Hover use for when the mouse pointer is over an element-->
    <button>Register</button><br><br>
    <!--Active: use for applied style while the element is being clicked-->
    <button>Submit</button>
    <!--First child: selects the first child element inside the parent-->
    <div>
    <p>First paragraph</p>
    <p>Second paragraph</p>
    <p>Third paragraph</p>
    </div>
    <!--nth-child :select an element according to its position-->
    <ul>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
    </ul>
    <!--checked: select checkbox n radio button-->
    <input type="checkbox" checked><br><br>
    <!--disabled: Selects disabled form elements.-->
    <input type="text" disabled><br><br>
    <!--required: Selects input fields that must be filled-->
    <input type="email" required>
    <!--last-child: select the last child element-->
    <div>
        <p>Pseudo Selector</p>
        <p>Pseudo class selector </p>
        <p>Pseudo Element selector</p>

    </div>
    <!--Focus:Applies styles when an input field gains focus-->
    


</body>
</html>
