<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preference for the type of CSS</title>
</head>
     <style> </style>
<body>
    <!--Inline Css-->
    <h1>MY name is Nida</h1>
    <!--Internal CSS-->
    <h1 style="color: rgb(168, 127, 255);">MY name is Nida</h1>
    <!--Extenal CSS-->
    <h1 style="color: rgb(127, 255, 157);">MY name is Nida</h1>
</body>
</html>
