<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>

<body bgcolor="#33daff">

<h1 align="center">STUDENT REGISTRATION FORM</h1>

<form>

    <fieldset>
        <legend><b>Student Information</b></legend>

        <label>Full Name:</label>
        <input type="text" name="name">
        <br><br>

        <label>Date of Birth:</label>
        <input type="date" name="dob">
        <br><br>

        <label>Gender:</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>

        <label>Age:</label>
        <input type="number">
        <br><br>

        <label>Phone Number:</label>
        <input type="tel">
        <br><br>

        <label>Email Address:</label>
        <input type="email">
        <br><br>

        <label>Address:</label>
        <textarea rows="3" cols="30"></textarea>

    </fieldset>


    <br>


    <fieldset>
        <legend><b>Course Information</b></legend>

        <label>Course Name:</label>

        <select>
            <option>B.Tech CSE</option>
            <option>B.Tech IT</option>
            <option>BCA</option>
            <option>MCA</option>
        </select>

        <br><br>

        <label>Year:</label>
        <select>
            <option>First Year</option>
            <option>Second Year</option>
            <option>Third Year</option>
            <option>Final Year</option>
        </select>

        <br><br>

        <label>Skills:</label>

        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JavaScript

    </fieldset>


    <br>


    <fieldset>
        <legend><b>Additional Information</b></legend>

        <label>Previous Qualification:</label>
        <input type="text">

        <br><br>

        <label>College Name:</label>
        <input type="text">

        <br><br>

        <label>Why do you want to join this course?</label>
        <br>

        <textarea rows="4" cols="40"></textarea>

    </fieldset>


    <br>


    <fieldset>
        <legend><b>Declaration</b></legend>

        <p>
        I confirm that all the information provided above is correct.
        </p>

        <label>Signature:</label>
        <input type="text">

        <label>Date:</label>
        <input type="date">

    </fieldset>


    <br>

    <center>
        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </center>


</form>

</body>
</html>
