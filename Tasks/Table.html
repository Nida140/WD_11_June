<!DOCTYPE html>
<html>
<head>
    <title>Student Course Table</title>

    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin: 20px auto;
        }

        th, td {
            border: 2px solid black;
            padding: 10px;
        }

        th {
            text-align: center;
            background-color: lightgray;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <th>Name</th>
            <th>Course</th>
            <th>City</th>
        </tr>

        <tr>
            <td>Amit</td>
            <td>AWS</td>
            <td>Pune</td>
        </tr>

        <tr>
            <td>Priya</td>
            <td>DevOps</td>
            <td>Mumbai</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>Full Stack</td>
            <td>Nashik</td>
        </tr>
    </table>

</body>
</html>
